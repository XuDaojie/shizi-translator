name: Release

# 日常发版流程：
#   1. 本地 npm run release:bump（或 --beta）写版本、commit、打 tag
#   2. git push && git push --tags
#   3. 本 workflow 在 tag v* 上构建 NSIS 并挂到 GitHub Release
# 也可在 Actions 页手动 workflow_dispatch 重跑指定 tag。

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要构建的 tag（如 v0.7.0-beta.1）"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          case "$TAG" in
            v*) ;;
            *) echo "tag 必须以 v 开头: $TAG" >&2; exit 1 ;;
          esac
          PRERELEASE=false
          case "$TAG" in
            *-beta.*|*-alpha.*|*-rc.*) PRERELEASE=true ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      # 读 tauri.conf.json → npm run build → cargo tauri build → 上传 NSIS 到 Release
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: ${{ steps.meta.outputs.tag }}
          releaseDraft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          # 项目未接 updater，不上传无用 json
          uploadUpdaterJson: false
