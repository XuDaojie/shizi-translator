name: Release

# 日常发版流程：
#   1. 本地 npm run release:bump（或 --beta）写版本、commit、打 tag
#   2. git push && git push --tags
#   3. 本 workflow 在 tag v* 上构建 NSIS 并挂到 GitHub Release
# 也可在 Actions 页手动 workflow_dispatch 重跑指定 tag。
# 主干每日滚动构建见 nightly.yml（固定 tag nightly，不进 semver 通道）。

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要构建的 tag（如 v0.7.0-beta.1）"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          case "$TAG" in
            v*) ;;
            *) echo "tag 必须以 v 开头: $TAG" >&2; exit 1 ;;
          esac
          PRERELEASE=false
          case "$TAG" in
            *-beta.*|*-alpha.*|*-rc.*) PRERELEASE=true ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      # 与本地一致：npm run tauri build；显式 --bundles nsis，避免只产出 exe
      - name: Build NSIS installer
        run: npm run tauri -- build --bundles nsis

      - name: List bundle artifacts
        shell: bash
        run: |
          ls -la src-tauri/target/release/bundle/nsis/ || true
          if ! ls src-tauri/target/release/bundle/nsis/*-setup.exe >/dev/null 2>&1; then
            echo "NSIS 安装包未生成" >&2
            find src-tauri/target/release -maxdepth 3 -type f \( -name '*.exe' -o -name '*.msi' \) -print || true
            exit 1
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          # 由 GitHub 根据上一个 tag 到本 tag 的 commits/PRs 自动生成更新说明
          generate_release_notes: true
          files: src-tauri/target/release/bundle/nsis/*-setup.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
